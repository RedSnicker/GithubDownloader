name: Download Videos from videos.txt

on:
  push:
    paths:
      - 'videos.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp and ffmpeg
        run: |
          pip install --upgrade yt-dlp
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Create videos directory
        run: mkdir -p videos

      - name: Write cookies from base64 secret
        run: |
          python3 << 'PYEOF'
          import base64
          import os

          b64 = os.environ.get('COOKIES_B64', '')

          if b64:
              try:
                  cookies = base64.b64decode(b64).decode('utf-8')
                  with open('/tmp/cookies.txt', 'w') as f:
                      f.write(cookies)
                  lines = len(cookies.splitlines())
                  print(f'✅ Decoded cookies file: {lines} lines')
              except Exception as e:
                  print(f'❌ Failed to decode cookies: {e}')
                  open('/tmp/cookies.txt', 'w').close()
          else:
              print('⚠️ No YOUTUBE_COOKIES_B64 secret found')
              print('YouTube downloads may fail without authentication')
              open('/tmp/cookies.txt', 'w').close()
          PYEOF
        env:
          COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}

      - name: Validate cookies file
        run: |
          if [ -s /tmp/cookies.txt ]; then
            LINES=$(wc -l < /tmp/cookies.txt)
            echo "✅ Cookies file has ${LINES} lines"
          else
            echo "⚠️ Cookies file is empty - YouTube may block downloads"
          fi

      - name: Download videos at 720p
        run: |
          if [ ! -f videos.txt ]; then
            echo "❌ videos.txt not found!"
            exit 1
          fi

          # Remove empty lines and comments
          grep -v '^\s*$' videos.txt | grep -v '^\s*#' > /tmp/clean_links.txt || true

          if [ ! -s /tmp/clean_links.txt ]; then
            echo "⚠️ No valid links found in videos.txt"
            exit 0
          fi

          TOTAL_LINKS=$(wc -l < /tmp/clean_links.txt)
          echo "=== Starting downloads (${TOTAL_LINKS} links) ==="

          DOWNLOAD_COUNT=0
          FAIL_COUNT=0
          CURRENT=0

          # Build cookie argument
          COOKIE_ARG=""
          if [ -s /tmp/cookies.txt ]; then
            COOKIE_ARG="--cookies /tmp/cookies.txt"
            echo "🍪 Using cookies for authentication"
          else
            echo "⚠️ No cookies - proceeding without authentication"
          fi

          while IFS= read -r url || [ -n "$url" ]; do
            # Trim whitespace
            url=$(echo "$url" | xargs)

            if [ -z "$url" ]; then
              continue
            fi

            CURRENT=$((CURRENT + 1))
            echo ""
            echo "========================================"
            echo "[${CURRENT}/${TOTAL_LINKS}] Downloading:"
            echo "$url"
            echo "========================================"

            yt-dlp \
              -f "bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/bestvideo[height<=720]+bestaudio/best[height<=720]/best" \
              --merge-output-format mp4 \
              --output "videos/%(title)s [%(id)s].%(ext)s" \
              --restrict-filenames \
              --no-overwrites \
              --no-playlist \
              --retries 5 \
              --retry-sleep 5 \
              --socket-timeout 30 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              --extractor-args "youtube:player_client=web,mweb" \
              --add-header "Accept-Language:en-US,en;q=0.9" \
              $COOKIE_ARG \
              "$url" && {
                echo "✅ Success: $url"
                DOWNLOAD_COUNT=$((DOWNLOAD_COUNT + 1))
              } || {
                echo "❌ Failed: $url"
                FAIL_COUNT=$((FAIL_COUNT + 1))
              }

          done < /tmp/clean_links.txt

          echo ""
          echo "========================================"
          echo "         DOWNLOAD SUMMARY"
          echo "========================================"
          echo "✅ Successful: ${DOWNLOAD_COUNT}"
          echo "❌ Failed: ${FAIL_COUNT}"
          echo "📁 Total: ${TOTAL_LINKS}"
          echo ""
          echo "=== Files in videos/ ==="
          ls -lh videos/ 2>/dev/null || echo "No files downloaded"

      - name: Check for new video files
        id: check_files
        run: |
          VIDEO_COUNT=$(find videos -maxdepth 1 -name "*.mp4" -type f 2>/dev/null | wc -l)
          echo "video_count=${VIDEO_COUNT}" >> $GITHUB_OUTPUT

          if [ "${VIDEO_COUNT}" -gt 0 ]; then
            echo "has_videos=true" >> $GITHUB_OUTPUT
            echo "✅ Found ${VIDEO_COUNT} video(s)"
          else
            echo "has_videos=false" >> $GITHUB_OUTPUT
            echo "⚠️ No videos were downloaded"
          fi

          TOTAL_SIZE=$(du -sh videos/ 2>/dev/null | cut -f1 || echo "0")
          echo "total_size=${TOTAL_SIZE}" >> $GITHUB_OUTPUT

      - name: Configure Git
        if: steps.check_files.outputs.has_videos == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit videos to repo
        if: steps.check_files.outputs.has_videos == 'true'
        id: commit_videos
        run: |
          COMMITTED=0
          SKIPPED=0
          SKIPPED_FILES=""

          echo "=== Checking file sizes ==="

          for file in videos/*.mp4; do
            if [ ! -f "$file" ]; then
              continue
            fi

            FILE_SIZE=$(stat --format=%s "$file")
            FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
            FILE_NAME=$(basename "$file")

            if [ "$FILE_SIZE_MB" -lt 100 ]; then
              git add "$file"
              echo "📁 Staged: ${FILE_NAME} (${FILE_SIZE_MB}MB)"
              COMMITTED=$((COMMITTED + 1))
            else
              echo "⚠️ Too large for repo (>100MB): ${FILE_NAME} (${FILE_SIZE_MB}MB)"
              SKIPPED=$((SKIPPED + 1))
              SKIPPED_FILES="${SKIPPED_FILES}${FILE_NAME}, "
            fi
          done

          echo "committed_count=${COMMITTED}" >> $GITHUB_OUTPUT
          echo "skipped_count=${SKIPPED}" >> $GITHUB_OUTPUT

          if [ "$COMMITTED" -gt 0 ]; then
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            git commit -m "📹 Auto-download: Added ${COMMITTED} video(s) - ${TIMESTAMP}"
            git push
            echo "repo_pushed=true" >> $GITHUB_OUTPUT
            echo "✅ Committed ${COMMITTED} video(s) to repository"
          else
            echo "repo_pushed=false" >> $GITHUB_OUTPUT
            echo "⚠️ No files small enough to commit to repo"
          fi

          if [ "$SKIPPED" -gt 0 ]; then
            echo "ℹ️ Files only in release (too large for repo): ${SKIPPED_FILES}"
          fi

      - name: Generate release tag and body
        if: steps.check_files.outputs.has_videos == 'true'
        id: release_info
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          TAG="videos-${TIMESTAMP}"
          READABLE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "timestamp=${READABLE}" >> $GITHUB_OUTPUT

          # Create release body
          cat << 'HEADER' > /tmp/release_body.md
          ## 📹 Auto-Downloaded Videos

          HEADER

          {
            echo "**Downloaded at:** ${READABLE}"
            echo "**Total files:** ${{ steps.check_files.outputs.video_count }}"
            echo "**Total size:** ${{ steps.check_files.outputs.total_size }}"
            echo ""
            echo "### 📁 Files included:"
            echo ""
          } >> /tmp/release_body.md

          for file in videos/*.mp4; do
            if [ -f "$file" ]; then
              FILE_NAME=$(basename "$file")
              FILE_SIZE=$(du -h "$file" | cut -f1)
              echo "- \`${FILE_NAME}\` (${FILE_SIZE})" >> /tmp/release_body.md
            fi
          done

          {
            echo ""
            echo "### 🔗 Source links:"
            echo ""
            echo '```'
            cat videos.txt
            echo '```'
            echo ""
            echo "---"
            echo "*Downloaded automatically by GitHub Actions*"
          } >> /tmp/release_body.md

          echo "✅ Release body generated"

      - name: Copy assets for release
        if: steps.check_files.outputs.has_videos == 'true'
        run: |
          mkdir -p /tmp/release_assets

          for file in videos/*.mp4; do
            if [ -f "$file" ]; then
              cp "$file" /tmp/release_assets/
              echo "📦 Copied: $(basename "$file")"
            fi
          done

          echo ""
          echo "=== Release assets ready ==="
          ls -lh /tmp/release_assets/

      - name: Create GitHub Release
        if: steps.check_files.outputs.has_videos == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: "📹 Videos - ${{ steps.release_info.outputs.timestamp }}"
          body_path: /tmp/release_body.md
          draft: false
          prerelease: false
          files: /tmp/release_assets/*.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f /tmp/cookies.txt
          rm -f /tmp/cookies_b64.txt
          echo "🧹 Cleaned up sensitive files"

      - name: Job Summary
        if: always()
        run: |
          {
            echo "# 📊 Video Download Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| 📥 Videos downloaded | ${{ steps.check_files.outputs.video_count || '0' }} |"
            echo "| 💾 Total size | ${{ steps.check_files.outputs.total_size || 'N/A' }} |"
            echo "| ✅ Committed to repo | ${{ steps.commit_videos.outputs.committed_count || '0' }} |"
            echo "| ⏭️ Skipped (>100MB) | ${{ steps.commit_videos.outputs.skipped_count || '0' }} |"
            echo "| 🏷️ Release created | ${{ steps.check_files.outputs.has_videos || 'false' }} |"
            echo ""
            if [ "${{ steps.check_files.outputs.has_videos }}" == "true" ]; then
              echo "## 📁 Downloaded Files"
              echo ""
              for file in videos/*.mp4 2>/dev/null; do
                if [ -f "$file" ]; then
                  FILE_NAME=$(basename "$file")
                  FILE_SIZE=$(du -h "$file" | cut -f1)
                  echo "- \`${FILE_NAME}\` (${FILE_SIZE})"
                fi
              done
            fi
          } >> $GITHUB_STEP_SUMMARY
